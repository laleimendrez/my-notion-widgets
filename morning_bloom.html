<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Morning Bloom</title>
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: serif !important; 
    font-style: normal !important; 
  }

  html, body {
    overflow-x: hidden;
    background: transparent;
    width: 100%;
    position: relative;
  }

  .card {
    background: transparent;
    padding: 10px 0px;
    width: 100%;
    margin: 0 auto;
    position: relative;
  }

  /* Header Columns */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
    gap: 12px;
  }

  .subtitle {
    font-size: 18px;
    color: #c060a1;
    text-transform: lowercase;
  }

  /* Rounded Shape for Date Nav */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #fff0f8;
    border: 1px solid #f2d6e8;
    border-radius: 40px;
    padding: 7px 20px;
  }

  .date-btn {
    background: none;
    border: none;
    color: #c060a1;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    transition: transform 0.15s;
  }

  .date-btn:hover { 
    transform: scale(1.2); 
  }

  .date-display {
    font-size: 16px;
    color: #9b6bbd;
    min-width: 190px;
    text-align: center;
  }

  .questions { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    width: 100%;
  }

  /* Box background blocks */
  .q-block { 
    width: 100%;
    border-radius: 14px; 
    padding: 12px 16px; 
    border: none !important; 
  }

  .q1 { background: #fff0f8; } /* Pink Box */
  .q2 { background: #fffbf0; } /* Yellow Box */
  .q3 { background: #f0f6ff; } /* Blue Box */
  .q4 { background: #f8f0ff; } /* Purple Box */

  .q-label {
    font-size: 17px; 
    margin-bottom: 6px;
    display: block;
    font-weight: 400;
  }

  /* Your new rotated label text color assignments */
  .q1 .q-label { color: #7040c0; } /* Pink box label -> Purple text */
  .q2 .q-label { color: #c060a0; } /* Yellow box label -> Pink text */
  .q3 .q-label { color: #a07820; } /* Blue box label -> Yellow/Brown text */
  .q4 .q-label { color: #4070c0; } /* Purple box label -> Blue text */

  /* Compact input fields that auto-expand dynamically */
  textarea {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.65);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 16px; 
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 36px; 
    height: 36px;
    overflow-y: hidden;
    opacity: 1;
    transition: opacity 0.2s ease, background-color 0.2s ease;
  }

  /* Matching your typing color configurations exactly to the labels */
  #q1 { color: #7040c0; }
  #q2 { color: #c060a0; }
  #q3 { color: #a07820; }
  #q4 { color: #4070c0; }

  textarea.switching {
    opacity: 0.3;
  }

  textarea::placeholder { color: #ccc; }
  textarea:focus { background: white; }

  /* Minimal Clean Button */
  .save-btn {
    width: 100%;
    padding: 12px;
    background-color: #fcf0ff; 
    border: 1px solid #ebd6ff; 
    border-radius: 40px;
    color: #7848b8;
    font-size: 16px; 
    font-weight: 500;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.03em;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }

  .save-btn:hover { 
    background-color: #f5e0ff;
  }

  .save-btn:active {
    transform: scale(0.99);
  }

  /* Centered Alert Overlay Notification System */
  .magic-save-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid #f0e0ff;
    box-shadow: 0 6px 20px rgba(120, 72, 184, 0.08);
    padding: 14px 28px;
    border-radius: 30px;
    color: #7040c0;
    font-size: 17px;
    font-weight: 500;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .magic-save-overlay.show {
    opacity: 1;
  }

  .footer {
    text-align: center;
    font-size: 14px; 
    color: #cca4ca;
    margin-top: 18px; 
  }

  /* Mobile Layout Rules */
  @media (max-width: 600px) {
    .header-container {
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      text-align: center !important;
      gap: 14px;
    }
    
    .subtitle {
      order: 1 !important;
      font-size: 18px !important;
    }
    
    .date-nav {
      order: 2 !important;
      width: 100%;
      max-width: 320px;
    }
  }
</style>
</head>
<body>
<div class="card">
  
  <div class="header-container">
    <div class="subtitle">magic blooming one task at a time</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">←</button>
      <div class="date-display" id="dateDisplay"></div>
      <button class="date-btn" onclick="changeDate(1)">→</button>
    </div>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">today is:</span>
      <textarea id="q1" rows="1" placeholder="name this day something beautiful..." oninput="autoGrow(this)"></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">how am i feeling right now?</span>
      <textarea id="q2" rows="1" placeholder="even one word is enough..." oninput="autoGrow(this)"></textarea>
    </div>
    <div class="q-block q3">
      <span class="q-label">one thing i am grateful for today:</span>
      <textarea id="q3" rows="1" placeholder="big or small, it all counts..." oninput="autoGrow(this)"></textarea>
    </div>
    <div class="q-block q4">
      <span class="q-label">my intention for today:</span>
      <textarea id="q4" rows="1" placeholder="what kind of magic will you make today?" oninput="autoGrow(this)"></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this day</button>
  <div class="footer">rest now, little dreamer. you did enough today</div>
</div>

<div class="magic-save-overlay" id="magicSave">saved securely</div>

<script>
  let currentDate = new Date();

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function getKey(d) { return 'morning_' + d.toISOString().split('T')[0]; }

  function autoGrow(element) {
    element.style.height = "36px";
    element.style.height = (element.scrollHeight) + "px";
  }

  function changeDate(dir) {
    const textareas = document.querySelectorAll('textarea');
    textareas.forEach(ta => ta.classList.add('switching'));
    
    setTimeout(() => {
      currentDate.setDate(currentDate.getDate() + dir);
      document.getElementById('dateDisplay').textContent = formatDate(currentDate);
      load();
      textareas.forEach(ta => {
        ta.classList.remove('switching');
        autoGrow(ta); 
      });
    }, 150);
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      q3: document.getElementById('q3').value,
      q4: document.getElementById('q4').value,
    }));

    const overlay = document.getElementById('magicSave');
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 1500);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    ['q1','q2','q3','q4'].forEach(id => {
      const ta = document.getElementById(id);
      ta.value = e[id] || '';
      autoGrow(ta);
    });
  }

  updateDisplay();
</script>
</body>
</html>
