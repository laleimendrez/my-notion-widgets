<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Morning Bloom</title>
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: serif !important; /* Forces standard system serif font strictly */
  }

  html, body {
    overflow-x: hidden;
    background: transparent;
    width: 100%;
  }

  /* Maximized container styling (sagad to edges) */
  .card {
    background: transparent;
    padding: 10px 0px;
    width: 100%;
    margin: 0 auto;
  }

  /* Header Split Column */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
  }

  .subtitle {
    font-size: 18px;
    color: #c060a1;
    font-style: italic;
    text-transform: lowercase;
  }

  /* Original Rounded Shape for Date Nav Preserved */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #fff0f8;
    border: 1px solid #f2d6e8;
    border-radius: 40px;
    padding: 7px 20px;
  }

  .date-btn {
    background: none;
    border: none;
    color: #c060a1;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    transition: transform 0.15s;
  }

  .date-btn:hover { 
    transform: scale(1.3); 
  }

  .date-display {
    font-size: 16px;
    color: #9b6bbd;
    font-style: italic;
    min-width: 190px;
    text-align: center;
  }

  /* Questions container stretched 100% wide */
  .questions { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    width: 100%;
  }

  .q-block { 
    width: 100%;
    border-radius: 14px; 
    padding: 14px 18px; 
  }

  /* EXACT ORIGINAL BLOCK COLORS & BORDERS PRESERVED UNTOUCHED */
  .q1 { background: #fff0f8; border: 1px solid #f9c8e0; }
  .q2 { background: #fffbf0; border: 1px solid #f5e4a0; }
  .q3 { background: #f0f6ff; border: 1px solid #b8d8f8; }
  .q4 { background: #f8f0ff; border: 1px solid #d8b8f8; }

  .q-label {
    font-size: 18px; 
    font-style: italic;
    margin-bottom: 8px;
    display: block;
    font-weight: 600;
  }

  .q1 .q-label { color: #c060a0; }
  .q2 .q-label { color: #a07820; }
  .q3 .q-label { color: #4070c0; }
  .q4 .q-label { color: #7040c0; }

  /* Input fields featuring clean fade-in switching transition styles */
  textarea {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 16px; 
    color: #4a4a4a;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 48px;
    overflow: hidden;
    opacity: 1;
    transform: translateY(0px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  /* Target animation classes triggering on change action triggers */
  textarea.switching {
    opacity: 0;
    transform: translateY(4px);
  }

  textarea.saved-flash {
    animation: flashSuccess 0.4s ease-out;
  }

  textarea::placeholder { color: #ccc; font-style: italic; }
  textarea:focus { background: white; }

  /* Premium Solid Minimal Button */
  .save-btn {
    width: 100%;
    padding: 14px;
    background-color: #f8f0ff; 
    border: 1px solid #e3d2f5;
    border-radius: 40px;
    color: #7848b8;
    font-size: 16px; 
    font-style: italic;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.04em;
    transition: background-color 0.2s, transform 0.1s;
  }

  .save-btn:hover { 
    background-color: #f3e5ff;
    transform: translateY(-1px); 
  }

  /* Space Minimizer Elements applied downward */
  .saved-msg {
    text-align: center;
    font-size: 14px;
    color: #92c484;
    font-style: italic;
    margin-top: 4px;
    min-height: 16px;
  }

  .footer {
    text-align: center;
    font-size: 14px; 
    color: #cca4ca;
    font-style: italic;
    margin-top: 4px; /* Lessened space drastically */
  }

  /* Transition Animations */
  @keyframes flashSuccess {
    0% { background: rgba(255, 255, 255, 0.7); }
    50% { background: rgba(255, 255, 255, 1); transform: scale(1.005); }
    100% { background: rgba(255, 255, 255, 0.7); }
  }
</style>
</head>
<body>
<div class="card">
  
  <div class="header-container">
    <div class="subtitle">magic blooming one task at a time</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">←</button>
      <div class="date-display" id="dateDisplay"></div>
      <button class="date-btn" onclick="changeDate(1)">→</button>
    </div>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">today is:</span>
      <textarea id="q1" rows="2" placeholder="name this day something beautiful..."></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">how am i feeling right now?</span>
      <textarea id="q2" rows="2" placeholder="even one word is enough..."></textarea>
    </div>
    <div class="q-block q3">
      <span class="q-label">one thing i am grateful for today:</span>
      <textarea id="q3" rows="2" placeholder="big or small, it all counts..."></textarea>
    </div>
    <div class="q-block q4">
      <span class="q-label">my intention for today:</span>
      <textarea id="q4" rows="2" placeholder="what kind of magic will you make today?"></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this day</button>
  <div class="saved-msg" id="savedMsg"></div>
  <div class="footer">rest now, little dreamer. you did enough today</div>
</div>

<script>
  let currentDate = new Date();

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function getKey(d) { return 'morning_' + d.toISOString().split('T')[0]; }

  function changeDate(dir) {
    const textareas = document.querySelectorAll('textarea');
    
    // Smooth fade outward
    textareas.forEach(ta => ta.classList.add('switching'));
    
    setTimeout(() => {
      currentDate.setDate(currentDate.getDate() + dir);
      document.getElementById('dateDisplay').textContent = formatDate(currentDate);
      load();
      
      // Smooth fade back inward
      textareas.forEach(ta => ta.classList.remove('switching'));
    }, 200);
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      q3: document.getElementById('q3').value,
      q4: document.getElementById('q4').value,
    }));

    // Trigger soft flash interaction animation
    const textareas = document.querySelectorAll('textarea');
    textareas.forEach(ta => {
      ta.classList.add('saved-flash');
      setTimeout(() => ta.classList.remove('saved-flash'), 400);
    });

    const msg = document.getElementById('savedMsg');
    msg.textContent = 'saved securely!';
    setTimeout(() => msg.textContent = '', 2000);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    ['q1','q2','q3','q4'].forEach(id => document.getElementById(id).value = e[id] || '');
  }

  // Auto-initializes instantly to current dynamic live system time
  updateDisplay();
</script>
</body>
</html>
