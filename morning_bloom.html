<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Morning Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    overflow-x: hidden;
    background: transparent; /* No background color */
    font-family: 'Lora', serif;
  }

  /* Maxed out container to utilize 100% width with subtle widget animation */
  .card {
    background: transparent;
    padding: 16px 4px;
    width: 100%;
    margin: 0 auto;
    animation: float 4s ease-in-out infinite; 
  }

  /* Header Layout: Text on Left, Date on Right */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 24px;
    padding: 0 4px;
  }

  .subtitle {
    font-size: 16px; /* Bigger font size */
    color: #c060a1;
    font-style: italic;
    text-transform: lowercase;
  }

  /* Minimalist Date Picker on the right */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    background: transparent;
  }

  .date-btn {
    background: none;
    border: none;
    color: #c060a1;
    cursor: pointer;
    font-size: 18px; /* Bigger font size */
    transition: transform 0.2s;
  }

  .date-btn:hover { 
    transform: scale(1.2); 
  }

  .date-display {
    font-size: 16px; /* Bigger font size */
    color: #9b6bbd;
    font-style: italic;
    font-weight: 500;
  }

  /* Full-width Questions Layout (Sagad / No background color) */
  .questions { 
    display: flex; 
    flex-direction: column; 
    gap: 16px; 
    width: 100%;
  }

  .q-block { 
    width: 100%;
    border-radius: 14px; 
    padding: 16px 20px; 
    background: transparent; /* No background */
    transition: transform 0.2s ease;
  }
  
  .q-block:hover {
    transform: translateY(-2px);
  }

  /* Replaced block backgrounds with your matching pastel borders */
  .q1 { border: 2px solid #fff0f5; } /* Pastel Pink Border */
  .q2 { border: 2px solid #fffbf0; } /* Soft Yellow Border */
  .q3 { border: 2px solid #f0f7ff; } /* Light Blue Border */
  .q4 { border: 2px solid #f8f0ff; } /* Pastel Violet Border */

  .q-label {
    font-size: 16px; /* Bigger label font size */
    margin-bottom: 10px;
    display: block;
    font-weight: 400;
    font-style: italic;
  }

  .q1 .q-label { color: #b8508f; }
  .q2 .q-label { color: #b48a10; }
  .q3 .q-label { color: #3870b8; }
  .q4 .q-label { color: #7848b8; }

  /* Clean Input Areas */
  textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Lora', serif;
    font-size: 15px; /* Bigger font size */
    color: #4a4a4a;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 50px;
  }

  textarea::placeholder { color: #ccc; font-style: italic; }

  /* New solid chic button replacing the gradient */
  .save-btn {
    width: 100%;
    padding: 14px;
    background-color: #f8f0ff; /* Solid minimalist tone matching violet accents */
    border: 1px solid #e3d2f5;
    border-radius: 30px;
    color: #7848b8;
    font-family: 'Lora', serif;
    font-size: 15px; /* Bigger font size */
    font-style: italic;
    cursor: pointer;
    margin-top: 24px;
    letter-spacing: 0.05em;
    transition: background-color 0.2s, transform 0.1s;
  }

  .save-btn:hover { 
    background-color: #f3e5ff;
    transform: translateY(-1px); 
  }
  
  .save-btn:active {
    transform: translateY(1px);
  }

  .saved-msg {
    text-align: center;
    font-size: 13px;
    color: #92c484;
    font-style: italic;
    margin-top: 10px;
    min-height: 18px;
  }

  /* Animated Breathing Footer Text */
  .footer {
    text-align: center;
    font-size: 13px; /* Bigger font size */
    color: #cca4ca;
    font-style: italic;
    margin-top: 18px;
    animation: breathe 3s ease-in-out infinite;
  }

  /* --- Keyframe Animations --- */
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
    100% { transform: translateY(0px); }
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.65; transform: scale(0.99); }
    50% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="card">
  
  <!-- Left/Right Split Header Area -->
  <div class="header-container">
    <div class="subtitle">magic blooming one task at a time</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">←</button>
      <div class="date-display" id="dateDisplay"></div>
      <button class="date-btn" onclick="changeDate(1)">→</button>
    </div>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">today is:</span>
      <textarea id="q1" rows="2" placeholder="name this day something beautiful..."></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">how am i feeling right now?</span>
      <textarea id="q2" rows="2" placeholder="even one word is enough..."></textarea>
    </div>
    <div class="q-block q3">
      <span class="q-label">one thing i am grateful for today:</span>
      <textarea id="q3" rows="2" placeholder="big or small, it all counts..."></textarea>
    </div>
    <div class="q-block q4">
      <span class="q-label">my intention for today:</span>
      <textarea id="q4" rows="2" placeholder="what kind of magic will you make today?"></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this day</button>
  <div class="saved-msg" id="savedMsg"></div>
  <div class="footer">rest now, little dreamer. you did enough today</div>
</div>

<script>
  let currentDate = new Date();

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  // Key system tied to LocalStorage
  function getKey(d) { return 'morning_' + d.toISOString().split('T')[0]; }

  function changeDate(dir) {
    currentDate.setDate(currentDate.getDate() + dir);
    updateDisplay();
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      q3: document.getElementById('q3').value,
      q4: document.getElementById('q4').value,
    }));
    const msg = document.getElementById('savedMsg');
    msg.textContent = 'saved securely!';
    setTimeout(() => msg.textContent = '', 2500);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    ['q1','q2','q3','q4'].forEach(id => document.getElementById(id).value = e[id] || '');
  }

  updateDisplay();
</script>
</body>
</html>
