<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Morning Bloom</title>
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: serif !important; /* Strict system serif */
    font-style: normal !important; /* Forces all text to be non-italicized */
  }

  html, body {
    overflow-x: hidden;
    background: transparent;
    width: 100%;
    position: relative;
  }

  /* Full edge-to-edge container layout */
  .card {
    background: transparent;
    padding: 10px 0px;
    width: 100%;
    margin: 0 auto;
    position: relative;
  }

  /* Header Layout */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
    gap: 12px;
  }

  .subtitle {
    font-size: 18px;
    color: #c060a1;
    text-transform: lowercase;
  }

  /* Rounded Shape for Date Nav */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #fff0f8;
    border: 1px solid #f2d6e8;
    border-radius: 40px;
    padding: 7px 20px;
  }

  .date-btn {
    background: none;
    border: none;
    color: #c060a1;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    transition: transform 0.15s;
  }

  .date-btn:hover { 
    transform: scale(1.3); 
  }

  .date-display {
    font-size: 16px;
    color: #9b6bbd;
    min-width: 190px;
    text-align: center;
  }

  /* Stretched Questions (Sagad) */
  .questions { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    width: 100%;
  }

  /* YOUR EXACT ORIGINAL BLOCK COLORS - NO BORDERS */
  .q-block { 
    width: 100%;
    border-radius: 14px; 
    padding: 14px 18px; 
    border: none !important; 
  }

  .q1 { background: #fff0f8; }
  .q2 { background: #fffbf0; }
  .q3 { background: #f0f6ff; }
  .q4 { background: #f8f0ff; }

  .q-label {
    font-size: 18px; 
    margin-bottom: 8px;
    display: block;
    font-weight: 600;
  }

  .q1 .q-label { color: #c060a0; }
  .q2 .q-label { color: #a07820; }
  .q3 .q-label { color: #4070c0; }
  .q4 .q-label { color: #7040c0; }

  /* Input fields featuring clean dynamic transition styling on load */
  textarea {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 16px; 
    color: #4a4a4a;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 48px;
    overflow: hidden;
    opacity: 1;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  textarea.switching {
    opacity: 0;
    transform: translateY(2px);
  }

  textarea::placeholder { color: #ccc; }
  textarea:focus { background: white; }

  /* New Extra Cute Rounded Button Profile */
  .save-btn {
    width: 100%;
    padding: 14px;
    background-color: #ffffeb; /* Soft buttery yellow accent */
    border: 2px dashed #f5e4a0; /* Cute dashed craft border */
    border-radius: 50px;
    color: #a07820;
    font-size: 17px; 
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 0px #f5e4a0; /* Pop art 2D button shadow style */
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .save-btn:hover { 
    background-color: #fffde0;
    transform: translateY(-2px);
    box-shadow: 0 6px 0px #f5e4a0;
  }

  .save-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0px #f5e4a0;
  }

  /* Centered Magical Save Overlay Alert */
  .magic-save-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: rgba(255, 255, 255, 0.98);
    border: 2px dashed #d8b8f8;
    box-shadow: 0 10px 30px rgba(120, 72, 184, 0.15);
    padding: 18px 36px;
    border-radius: 40px;
    color: #7040c0;
    font-size: 20px;
    font-weight: 600;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .magic-save-overlay.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    letter-spacing: 0.05em;
  }

  /* Footer Area */
  .footer {
    text-align: center;
    font-size: 14px; 
    color: #cca4ca;
    margin-top: 22px; 
  }

  /* Responsive Design Overrides for Mobile Phones */
  @media (max-width: 600px) {
    .header-container {
      flex-direction: column !important; /* Forces vertical stacking */
      justify-content: center !important;
      align-items: center !important;
      text-align: center !important;
      gap: 14px;
    }
    
    .subtitle {
      order: 1 !important; /* Forces magic blooming text on top */
      font-size: 18px !important;
    }
    
    .date-nav {
      order: 2 !important; /* Places date nav directly underneath */
      width: 100%;
      max-width: 320px;
    }
  }
</style>
</head>
<body>
<div class="card">
  
  <div class="header-container">
    <div class="subtitle">magic blooming one task at a time</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">←</button>
      <div class="date-display" id="dateDisplay"></div>
      <button class="date-btn" onclick="changeDate(1)">→</button>
    </div>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">today is:</span>
      <textarea id="q1" rows="2" placeholder="name this day something beautiful..."></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">how am i feeling right now?</span>
      <textarea id="q2" rows="2" placeholder="even one word is enough..."></textarea>
    </div>
    <div class="q-block q3">
      <span class="q-label">one thing i am grateful for today:</span>
      <textarea id="q3" rows="2" placeholder="big or small, it all counts..."></textarea>
    </div>
    <div class="q-block q4">
      <span class="q-label">my intention for today:</span>
      <textarea id="q4" rows="2" placeholder="what kind of magic will you make today?"></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this day</button>
  <div class="footer">rest now, little dreamer. you did enough today</div>
</div>

<!-- Centered Pop Alert Overlay Container -->
<div class="magic-save-overlay" id="magicSave">saved securely!</div>

<script>
  let currentDate = new Date();

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function getKey(d) { return 'morning_' + d.toISOString().split('T')[0]; }

  function changeDate(dir) {
    const textareas = document.querySelectorAll('textarea');
    textareas.forEach(ta => ta.classList.add('switching'));
    
    setTimeout(() => {
      currentDate.setDate(currentDate.getDate() + dir);
      document.getElementById('dateDisplay').textContent = formatDate(currentDate);
      load();
      textareas.forEach(ta => ta.classList.remove('switching'));
    }, 150);
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      q3: document.getElementById('q3').value,
      q4: document.getElementById('q4').value,
    }));

    // Trigger magical centered overlay pop animation
    const overlay = document.getElementById('magicSave');
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 1800);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    ['q1','q2','q3','q4'].forEach(id => document.getElementById(id).value = e[id] || '');
  }

  // Auto-initializes to current live device date time on application initialization
  updateDisplay();
</script>
</body>
</html>
