<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Morning Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: transparent;
    font-family: 'Lora', serif;
  }

  .card {
    background: #fffbfd;
    padding: 28px 32px 24px;
    width: 100%;
    min-height: 100vh;
  }

  .sparkles {
    text-align: center;
    font-size: 13px;
    letter-spacing: 10px;
    margin-bottom: 6px;
    color: #e0a8c8;
  }

  .title {
    font-size: 22px;
    color: #c060a1;
    text-align: center;
    font-style: italic;
    font-weight: 400;
    margin-bottom: 3px;
  }

  .subtitle {
    font-size: 10px;
    color: #d4a0c0;
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-style: italic;
  }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #fff0f8;
    border: 1px solid #f2d6e8;
    border-radius: 40px;
    padding: 7px 20px;
    margin-bottom: 20px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  .date-btn {
    background: none;
    border: none;
    color: #c060a1;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Lora', serif;
    padding: 0 4px;
    transition: transform 0.15s;
  }

  .date-btn:hover { transform: scale(1.3); }

  .date-display {
    font-size: 12px;
    color: #9b6bbd;
    font-style: italic;
    min-width: 190px;
    text-align: center;
  }

  .questions { display: flex; flex-direction: column; gap: 10px; }

  .q-block { border-radius: 14px; padding: 12px 16px; }

  .q1 { background: #fff0f8; border: 1px solid #f9c8e0; }
  .q2 { background: #fffbf0; border: 1px solid #f5e4a0; }
  .q3 { background: #f0f6ff; border: 1px solid #b8d8f8; }
  .q4 { background: #f8f0ff; border: 1px solid #d8b8f8; }

  .q-label {
    font-size: 12.5px;
    font-style: italic;
    margin-bottom: 7px;
    display: block;
    font-weight: 500;
  }

  .q1 .q-label { color: #c060a0; }
  .q2 .q-label { color: #a07820; }
  .q3 .q-label { color: #4070c0; }
  .q4 .q-label { color: #7040c0; }

  textarea {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    padding: 8px 11px;
    font-family: 'Lora', serif;
    font-size: 13px;
    color: #666;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 48px;
    overflow: hidden;
  }

  textarea::placeholder { color: #ddd; font-style: italic; }
  textarea:focus { background: white; }

  .save-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #f4a7c8 0%, #c8a8f0 100%);
    border: none;
    border-radius: 40px;
    color: white;
    font-family: 'Lora', serif;
    font-size: 13.5px;
    font-style: italic;
    cursor: pointer;
    margin-top: 14px;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .save-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .saved-msg {
    text-align: center;
    font-size: 11px;
    color: #a0c890;
    font-style: italic;
    margin-top: 7px;
    min-height: 15px;
  }

  .footer {
    text-align: center;
    font-size: 11px;
    color: #d0b0c8;
    font-style: italic;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="sparkles">&#10022; &nbsp; &#10023; &nbsp; &#10022;</div>
  <div class="title">my morning bloom</div>
  <div class="subtitle">a little ritual for a magical day</div>

  <div class="date-nav">
    <button class="date-btn" onclick="changeDate(-1)">&#8592;</button>
    <div class="date-display" id="dateDisplay"></div>
    <button class="date-btn" onclick="changeDate(1)">&#8594;</button>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">today is...</span>
      <textarea id="q1" rows="2" placeholder="name this day something beautiful..."></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">how am i feeling right now?</span>
      <textarea id="q2" rows="2" placeholder="even one word is enough..."></textarea>
    </div>
    <div class="q-block q3">
      <span class="q-label">one thing i am grateful for today</span>
      <textarea id="q3" rows="2" placeholder="big or small, it all counts..."></textarea>
    </div>
    <div class="q-block q4">
      <span class="q-label">my intention for today</span>
      <textarea id="q4" rows="2" placeholder="what kind of magic will you make today?"></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this morning</button>
  <div class="saved-msg" id="savedMsg"></div>
  <div class="footer">every morning is a new petal blooming</div>
</div>

<script>
  let currentDate = new Date();

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function getKey(d) { return 'morning_' + d.toISOString().split('T')[0]; }

  function changeDate(dir) {
    currentDate.setDate(currentDate.getDate() + dir);
    updateDisplay();
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      q3: document.getElementById('q3').value,
      q4: document.getElementById('q4').value,
    }));
    const msg = document.getElementById('savedMsg');
    msg.textContent = 'saved! your bloom is safe';
    setTimeout(() => msg.textContent = '', 2500);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    ['q1','q2','q3','q4'].forEach(id => document.getElementById(id).value = e[id] || '');
  }

  updateDisplay();
</script>
</body>
</html>
