<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Night Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: transparent;
    font-family: 'Lora', serif;
  }

  .card {
    background: transparent;
    padding: 20px 0 24px;
    width: 100%;
    min-height: 100vh;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 11px;
    color: #b090d0;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-style: italic;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f4f0ff;
    border: 1px solid #dcc8f0;
    border-radius: 40px;
    padding: 6px 16px;
  }

  .date-btn {
    background: none;
    border: none;
    color: #7050b8;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Lora', serif;
    padding: 0 2px;
    transition: transform 0.15s;
  }

  .date-btn:hover { transform: scale(1.3); }

  .date-display {
    font-size: 11.5px;
    color: #9060c0;
    font-style: italic;
    min-width: 160px;
    text-align: center;
  }

  .questions { display: flex; flex-direction: column; gap: 10px; }

  .q-block {
    border-radius: 14px;
    padding: 12px 16px;
    width: 100%;
  }

  .q1 { background: #fffbf0; border: 1px solid #f5e4a0; }
  .q2 { background: #f0f6ff; border: 1px solid #b8d8f8; }

  .mood-section {
    background: #fff0f8;
    border: 1px solid #f2c8e0;
    border-radius: 14px;
    padding: 12px 16px;
    width: 100%;
  }

  .q-label {
    font-size: 12.5px;
    font-style: italic;
    margin-bottom: 7px;
    display: block;
    font-weight: 500;
  }

  .q1 .q-label { color: #a07820; }
  .q2 .q-label { color: #4070c0; }
  .mood-section .q-label { color: #c060a0; }

  textarea {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    padding: 8px 11px;
    font-family: 'Lora', serif;
    font-size: 13px;
    color: #666;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 48px;
    overflow: hidden;
  }

  textarea::placeholder { color: #ddd; font-style: italic; }
  textarea:focus { background: white; }

  .mood-options { display: flex; gap: 7px; flex-wrap: wrap; }

  .mood-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid #f0c8e0;
    background: white;
    cursor: pointer;
    font-size: 12px;
    color: #999;
    transition: all 0.2s;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  .mood-btn:hover { border-color: #c060a1; color: #c060a1; }
  .mood-btn.selected {
    background: linear-gradient(135deg, #f4a7c8, #c8a8f0);
    border-color: transparent;
    color: white;
  }

  .save-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #c8a8f0 0%, #a8c8f8 100%);
    border: none;
    border-radius: 40px;
    color: white;
    font-family: 'Lora', serif;
    font-size: 13.5px;
    font-style: italic;
    cursor: pointer;
    margin-top: 14px;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .save-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .saved-msg {
    text-align: center;
    font-size: 11px;
    color: #a0c890;
    font-style: italic;
    margin-top: 7px;
    min-height: 15px;
  }

  .footer {
    text-align: center;
    font-size: 11px;
    color: #c0a8d8;
    font-style: italic;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-row">
    <div class="subtitle">a gentle close to a magical day</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">&#8592;</button>
      <div class="date-display" id="dateDisplay"></div>
      <button class="date-btn" onclick="changeDate(1)">&#8594;</button>
    </div>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">something good that happened today</span>
      <textarea id="q1" rows="2" placeholder="even the tiniest thing counts..."></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">something i want to do better tomorrow</span>
      <textarea id="q2" rows="2" placeholder="growth looks different every day..."></textarea>
    </div>
    <div class="mood-section">
      <span class="q-label">how am i feeling right now?</span>
      <div class="mood-options">
        <button class="mood-btn" onclick="selectMood(this)">blooming</button>
        <button class="mood-btn" onclick="selectMood(this)">okay</button>
        <button class="mood-btn" onclick="selectMood(this)">struggling</button>
        <button class="mood-btn" onclick="selectMood(this)">tired</button>
        <button class="mood-btn" onclick="selectMood(this)">magical</button>
      </div>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this night</button>
  <div class="saved-msg" id="savedMsg"></div>
  <div class="footer">rest now, little dreamer. you did enough today</div>
</div>

<script>
  let currentDate = new Date();
  let selectedMood = '';

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function getKey(d) { return 'night_' + d.toISOString().split('T')[0]; }

  function changeDate(dir) {
    currentDate.setDate(currentDate.getDate() + dir);
    updateDisplay();
  }

  function selectMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.textContent;
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      mood: selectedMood,
    }));
    const msg = document.getElementById('savedMsg');
    msg.textContent = 'saved! sweet dreams, lalei';
    setTimeout(() => msg.textContent = '', 2500);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    document.getElementById('q1').value = e.q1 || '';
    document.getElementById('q2').value = e.q2 || '';
    selectedMood = e.mood || '';
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.classList.toggle('selected', b.textContent === selectedMood);
    });
  }

  updateDisplay();
</script>
</body>
</html>
