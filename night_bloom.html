<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Night Bloom</title>
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: serif !important; 
    font-style: normal !important; 
  }

  html, body {
    overflow-x: hidden;
    background: transparent;
    width: 100%;
    position: relative;
  }

  .card {
    background: transparent;
    padding: 10px 0px;
    width: 100%;
    margin: 0 auto;
    position: relative;
  }

  /* Header Layout Columns */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
    gap: 12px;
  }

  .subtitle {
    font-size: 18px;
    color: #b090d0;
    text-transform: lowercase;
  }

  /* Rounded Shape for Date Nav Preserved */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #f4f0ff;
    border: 1px solid #dcc8f0;
    border-radius: 40px;
    padding: 7px 20px;
  }

  .date-btn {
    background: none;
    border: none;
    color: #7050b8;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    transition: transform 0.15s;
  }

  .date-btn:hover { 
    transform: scale(1.2); 
  }

  .date-display {
    font-size: 16px;
    color: #9060c0;
    min-width: 190px;
    text-align: center;
  }

  .questions { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    width: 100%;
  }

  /* Block containers - Borders completely removed */
  .q-block, .mood-section { 
    width: 100%;
    border-radius: 14px; 
    padding: 12px 16px; 
    border: none !important; 
  }

  /* Your exact original background hex choices preserved */
  .q1 { background: #fffbf0; } /* Yellow Box */
  .q2 { background: #f0f6ff; } /* Blue Box */
  .mood-section { background: #fff0f8; } /* Pink Box */

  /* Lessened weight to match the morning widget look */
  .q-label {
    font-size: 17px; 
    margin-bottom: 8px;
    display: block;
    font-weight: 400;
  }

  .q1 .q-label { color: #a07820; }
  .q2 .q-label { color: #4070c0; }
  .mood-section .q-label { color: #c060a0; }

  /* Compact input fields that auto-expand dynamically */
  textarea {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.65);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 16px; 
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 36px; 
    height: 36px;
    overflow-y: hidden;
    opacity: 1;
    transition: opacity 0.2s ease, background-color 0.2s ease;
  }

  /* Dynamic color tracking inside writing windows */
  #q1 { color: #a07820; }
  #q2 { color: #4070c0; }

  textarea.switching {
    opacity: 0.3;
  }

  textarea::placeholder { color: #ccc; }
  textarea:focus { background: white; }

  /* Mood Selection Row Layout Styles */
  .mood-options { 
    display: flex; 
    gap: 8px; 
    flex-wrap: wrap; 
    margin-top: 4px;
  }

  .mood-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #f2c8e0;
    background: white;
    cursor: pointer;
    font-size: 15px;
    color: #c060a0;
    transition: all 0.2s ease;
  }

  .mood-btn:hover { 
    background-color: #fff5fa;
  }
  
  .mood-btn.selected {
    background: #fcf0ff; 
    border-color: #ebd6ff; 
    color: #7848b8;
    font-weight: 600;
  }

  /* Clean Minimal Solid Button Layout */
  .save-btn {
    width: 100%;
    padding: 12px;
    background-color: #fcf0ff; 
    border: 1px solid #ebd6ff; 
    border-radius: 40px;
    color: #7848b8;
    font-size: 16px; 
    font-weight: 500;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.03em;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }

  .save-btn:hover { 
    background-color: #f5e0ff;
  }

  .save-btn:active {
    transform: scale(0.99);
  }

  /* Seamless Soft Centered Fading Alert Notification HUD Overlay */
  .magic-save-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid #f0e0ff;
    box-shadow: 0 6px 20px rgba(120, 72, 184, 0.08);
    padding: 14px 28px;
    border-radius: 30px;
    color: #7040c0;
    font-size: 17px;
    font-weight: 500;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .magic-save-overlay.show {
    opacity: 1;
  }

  /* Lessened Bottom Spacing Parameters */
  .footer {
    text-align: center;
    font-size: 14px; 
    color: #cca4ca;
    margin-top: 18px; 
  }

  /* Mobile Layout Alignment Rules */
  @media (max-width: 600px) {
    .header-container {
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      text-align: center !important;
      gap: 14px;
    }
    
    .subtitle {
      order: 1 !important;
      font-size: 18px !important;
    }
    
    .date-nav {
      order: 2 !important;
      width: 100%;
      max-width: 320px;
    }
  }
</style>
</head>
<body>
<div class="card">
  
  <div class="header-container">
    <div class="subtitle">a gentle close to a magical day</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">←</button>
      <div class="date-display" id="dateDisplay"></div>
      <button class="date-btn" onclick="changeDate(1)">→</button>
    </div>
  </div>

  <div class="questions">
    <div class="q-block q1">
      <span class="q-label">something good that happened today:</span>
      <textarea id="q1" rows="1" placeholder="even the tiniest thing counts..." oninput="autoGrow(this)"></textarea>
    </div>
    <div class="q-block q2">
      <span class="q-label">something i want to do better tomorrow:</span>
      <textarea id="q2" rows="1" placeholder="growth looks different every day..." oninput="autoGrow(this)"></textarea>
    </div>
    <div class="mood-section">
      <span class="q-label">how am i feeling right now?</span>
      <div class="mood-options">
        <button class="mood-btn" onclick="selectMood(this)">blooming</button>
        <button class="mood-btn" onclick="selectMood(this)">okay</button>
        <button class="mood-btn" onclick="selectMood(this)">struggling</button>
        <button class="mood-btn" onclick="selectMood(this)">tired</button>
        <button class="mood-btn" onclick="selectMood(this)">magical</button>
      </div>
    </div>
  </div>

  <button class="save-btn" onclick="saveEntry()">save this night</button>
  <div class="footer">rest now, little dreamer. you did enough today</div>
</div>

<div class="magic-save-overlay" id="magicSave">saved securely</div>

<script>
  let currentDate = new Date();
  let selectedMood = '';

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function getKey(d) { return 'night_' + d.toISOString().split('T')[0]; }

  function autoGrow(element) {
    element.style.height = "36px";
    element.style.height = (element.scrollHeight) + "px";
  }

  function changeDate(dir) {
    const textareas = document.querySelectorAll('textarea');
    textareas.forEach(ta => ta.classList.add('switching'));
    
    setTimeout(() => {
      currentDate.setDate(currentDate.getDate() + dir);
      document.getElementById('dateDisplay').textContent = formatDate(currentDate);
      load();
      textareas.forEach(ta => {
        ta.classList.remove('switching');
        autoGrow(ta); 
      });
    }, 150);
  }

  function selectMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.textContent;
  }

  function updateDisplay() {
    document.getElementById('dateDisplay').textContent = formatDate(currentDate);
    load();
  }

  function saveEntry() {
    localStorage.setItem(getKey(currentDate), JSON.stringify({
      q1: document.getElementById('q1').value,
      q2: document.getElementById('q2').value,
      mood: selectedMood,
    }));

    const overlay = document.getElementById('magicSave');
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 1500);
  }

  function load() {
    const saved = localStorage.getItem(getKey(currentDate));
    const e = saved ? JSON.parse(saved) : {};
    document.getElementById('q1').value = e.q1 || '';
    document.getElementById('q2').value = e.q2 || '';
    selectedMood = e.mood || '';
    
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.classList.toggle('selected', b.textContent === selectedMood);
    });

    ['q1','q2'].forEach(id => autoGrow(document.getElementById(id)));
  }

  // Automatically fetch live system date time indicators inside initialization script runtime loop
  updateDisplay();
</script>
</body>
</html>
